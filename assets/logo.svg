<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="#0a0f1e"/>
  <!-- Border glow ring -->
  <rect width="120" height="120" rx="26" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>

  <!-- ECG pulse line — green to amber to red -->
  <polyline
    points="6,60 20,60 28,33 38,87 48,44 58,60 72,60 80,37 90,81 100,53 108,60 118,60"
    fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Centre pulse dot -->
  <circle cx="60" cy="60" r="4.5" fill="#22c55e"/>
  <circle cx="60" cy="60" r="8" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>

  <!-- Amber segment overlay (middle third) -->
  <polyline
    points="58,60 72,60 80,37 90,81"
    fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Red segment overlay (right third) -->
  <polyline
    points="90,81 100,53 108,60 118,60"
    fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />
</svg>
