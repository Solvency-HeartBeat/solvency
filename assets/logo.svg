<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1526"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="55%"  style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="480" height="120" rx="16" fill="url(#bg)"/>

  <!-- Pulse dot -->
  <circle cx="36" cy="60" r="10" fill="#22c55e" opacity="0.9" filter="url(#glow)"/>
  <circle cx="36" cy="60" r="16" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>

  <!-- Heartbeat / ECG line -->
  <polyline
    points="56,60 80,60 92,30 104,88 116,44 128,60 148,60 160,60 172,38 184,82 196,52 208,60 240,60 260,60"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Title -->
  <text x="274" y="52" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Solvency Heartbeat</text>

  <!-- Subtitle -->
  <text x="276" y="74" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.3">Real-time proof-of-reserves · Stellar</text>

  <!-- Divider -->
  <line x1="270" y1="82" x2="460" y2="82" stroke="#1e293b" stroke-width="1"/>

  <!-- Tag chips -->
  <rect x="276" y="89" width="54" height="16" rx="4" fill="#14532d" opacity="0.8"/>
  <text x="303" y="101" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle" font-weight="600">SOROBAN</text>

  <rect x="336" y="89" width="44" height="16" rx="4" fill="#1e3a5f" opacity="0.8"/>
  <text x="358" y="101" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="600">ON-CHAIN</text>

  <rect x="386" y="89" width="66" height="16" rx="4" fill="#3b1f0a" opacity="0.8"/>
  <text x="419" y="101" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">OPEN SOURCE</text>
</svg>
